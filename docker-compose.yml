services:
  mongodb:
    image: mongo:7
    container_name: greenplantai-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: greenplantai-backend
    restart: unless-stopped
    depends_on:
      - mongodb
    env_file:
      - ./backend/.env.docker
    ports:
      - "8001:8000"
    command: ["uvicorn", "server:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend:/app

volumes:
  mongodb_data:
